server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ────────────────────────────────────────────────────────
    # Compress responses — reduces bandwidth by 60-80% for text content
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Security headers ────────────────────────────────────────────────────────
    # Prevent clickjacking — stops your app being embedded in an iframe
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Stop browsers from guessing content types (MIME sniffing attacks)
    add_header X-Content-Type-Options "nosniff" always;

    # Enable browser's built-in XSS filter
    add_header X-XSS-Protection "1; mode=block" always;

    # Force HTTPS when you have SSL (safe to include now, activates only with HTTPS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Control what info is sent in the Referrer header
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Static file caching ─────────────────────────────────────────────────────
    # JS/CSS files have hashed names (e.g. index.abc123.js) — safe to cache forever
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── React app ───────────────────────────────────────────────────────────────
    # index.html must never be cached — it's the entry point that loads the hashed assets
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── API proxy ───────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://patient-service:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — prevents hanging requests from blocking workers
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Allow large file uploads (for the patient documents feature)
        client_max_body_size 15M;
    }
}
