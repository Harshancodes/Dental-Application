# Production docker-compose override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# What's different from dev:
# - Backend uses Gunicorn with multiple workers instead of uvicorn
# - No port 8000 exposed publicly — only nginx talks to the backend
# - Restart policy: always restart on crash
# - Resource limits prevent one container eating all memory

services:
  db:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  patient-service:
    restart: always
    # Override the start command to use Gunicorn
    command: ["./start.prod.sh"]
    environment:
      - ENVIRONMENT=production
    # Don't expose backend port publicly in production
    # nginx proxies to it internally on the Docker network
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
